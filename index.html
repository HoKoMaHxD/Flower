<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flower with Music</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="music-container" class="music-player">
        <div class="controls">
            <button id="prev" title="السابق">⏮</button>
            <button id="play-pause" title="تشغيل/إيقاف">▶</button>
            <button id="next" title="التالي">⏭</button>
        </div>
        <div id="youtube-player"></div>
    </div>

    <div class="flower">
        <div class="f-wrapper">
            <div class="flower__line"></div>
            <div class="f-1">
                <div class="leaf leaf--1"></div>
                <div class="leaf leaf--2"></div>
                <div class="leaf leaf--3"></div>
                <div class="leaf leaf--4"></div>
                <div class="leaf leaf--5"></div>
                <div class="leaf leaf--6"></div>
                <div class="leaf leaf--7"></div>
                <div class="leaf leaf--8"></div>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="main.js"></script>
</body>
</html>
